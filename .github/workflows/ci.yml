name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Install Dependencies
        run: flutter pub get

      - name: Validate Formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Static Analysis
        run: flutter analyze

      - name: Unit and Widget Tests with Coverage
        run: flutter test --coverage

      - name: Enforce Coverage Threshold
        env:
          MIN_COVERAGE: "70.0"
        run: |
          total_lines=$(grep -c '^DA:' coverage/lcov.info || true)
          hit_lines=$(awk -F',' '/^DA:/{if ($2 > 0) hit++} END{print hit+0}' coverage/lcov.info)

          if [ "$total_lines" -eq 0 ]; then
            echo "No coverage lines found in coverage/lcov.info."
            exit 1
          fi

          coverage_percent=$(awk "BEGIN {printf \"%.2f\", ($hit_lines/$total_lines)*100}")

          echo "Coverage: ${coverage_percent}%"
          echo "Minimum required: ${MIN_COVERAGE}%"

          awk "BEGIN {exit !($coverage_percent >= $MIN_COVERAGE)}"

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
